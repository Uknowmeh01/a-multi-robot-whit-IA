[platformio]
default_envs = esp32dev
src_dir = src

[env:esp32dev]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_src_filter = +<*> -<tests/>
lib_deps =
  claws/BH1750@^1.3.0
  adafruit/Adafruit NeoPixel@^1.12.3
build_flags =
  -DCORE_DEBUG_LEVEL=1

[env:test_motor_single]
extends = env:esp32dev
build_src_filter = +<motor_controller.cpp> +<tests/test_motor_single.cpp>

[env:test_motors_four]
extends = env:esp32dev
build_src_filter = +<motor_controller.cpp> +<tests/test_motors_four.cpp>

[env:test_ultrasonic]
extends = env:esp32dev
build_src_filter = +<ultrasonic_manager.cpp> +<tests/test_ultrasonic.cpp>

[env:test_bh1750]
extends = env:esp32dev
build_src_filter = +<sensor_manager.cpp> +<tests/test_bh1750.cpp>

[env:test_sound]
extends = env:esp32dev
build_src_filter = +<sensor_manager.cpp> +<tests/test_sound.cpp>

[env:test_leds]
extends = env:esp32dev
build_src_filter = +<led_controller.cpp> +<tests/test_leds.cpp>

[env:test_bluetooth]
extends = env:esp32dev
build_src_filter = +<bluetooth_controller.cpp> +<tests/test_bluetooth.cpp>

[env:test_serial]
extends = env:esp32dev
build_src_filter = +<serial_protocol.cpp> +<tests/test_serial.cpp>

[env:test_emergency]
extends = env:esp32dev
build_src_filter = +<motor_controller.cpp> +<ultrasonic_manager.cpp> +<tests/test_emergency.cpp>
